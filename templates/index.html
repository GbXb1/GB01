<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Data Privacy Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-8">

    <div class="max-w-6xl w-full bg-white p-12 rounded-3xl shadow-xl border border-slate-200 flex gap-12">

        <div class="w-5/12 flex flex-col justify-between border-r border-slate-100 pr-12">
            <div>
                <h1 class="text-3xl font-black text-indigo-900 mb-2 tracking-tight">K-Anonymity Auditor</h1>
                <p class="text-sm text-slate-500 mb-8 leading-relaxed">데이터 배포 전, 재식별 위험성을 6대 표준 보안 기준으로 자동 진단합니다.</p>

                <div class="mb-8 p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100/80">
                    <label class="block text-sm font-bold text-indigo-950 mb-3">📍 1단계: 업로드 데이터 성격 선택</label>
                    <p class="text-xs text-indigo-700/70 mb-4">해당 데이터셋에 고유식별정보(주민번호, 성명, 전화번호 등)가 포함되어 있습니까?</p>
                    <div class="flex gap-4">
                        <label
                            class="flex-1 flex items-center justify-center gap-2 bg-white px-4 py-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 font-medium text-sm text-slate-700">
                            <input type="radio" name="has_pii" value="yes" checked class="accent-indigo-600"> 네, 포함됨
                        </label>
                        <label
                            class="flex-1 flex items-center justify-center gap-2 bg-white px-4 py-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 font-medium text-sm text-slate-700">
                            <input type="radio" name="has_pii" value="no" class="accent-indigo-600"> 아니오, 미포함
                        </label>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">글로벌 데이터 보안 6대 심사 표준</h3>
                    <div class="text-xs text-slate-600 grid grid-cols-2 gap-2">
                        <div class="p-2.5 bg-slate-50 rounded-xl">🛡️ 1. K-익명성 위험도</div>
                        <div class="p-2.5 bg-slate-50 rounded-xl">📉 2. 데이터 결측치율</div>
                        <div class="p-2.5 bg-slate-50 rounded-xl">🆔 3. 식별정보 노출도</div>
                        <div class="p-2.5 bg-slate-50 rounded-xl">📊 4. 통계적 이상치율</div>
                        <div class="p-2.5 bg-slate-50 rounded-xl">🔗 5. 결합 재식별도</div>
                        <div class="p-2.5 bg-slate-50 rounded-xl">🗂️ 6. 표본 규모 적정성</div>
                    </div>
                </div>
            </div>

            <p class="text-[11px] text-slate-400 pt-6 mt-6 border-t border-slate-100 italic">※ 가이드라인에 따른 6개 과목 과락/가중치가
                조합되어 최종 등급이 결정됩니다.</p>
        </div>

        <div class="w-7/12 flex flex-col justify-center">
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-800 mb-2.5 tracking-wide">2단계: 심사할 CSV 파일 업로드</label>
                <input type="file" id="csvFile"
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer font-medium">
            </div>

            <button onclick="audit()"
                class="w-full bg-slate-900 text-white py-3.5 rounded-xl text-base font-bold hover:bg-slate-800 active:scale-[0.99] transition-all shadow-md">
                보안 안전성 종합 심사 시작
            </button>

            <div id="result" class="hidden mt-8 p-6 border rounded-2xl shadow-sm text-center"></div>
        </div>
    </div>

    <script>
        async function audit() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert('심사할 CSV 파일을 선택해주세요.');

            // 라디오 버튼 선택값 추출
            const hasPii = document.querySelector('input[name="has_pii"]:checked').value;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('has_pii', hasPii); // 파이썬으로 전송

            const resDiv = document.getElementById('result');
            resDiv.classList.remove('hidden');
            resDiv.className = "mt-8 p-6 border rounded-2xl text-center bg-slate-50 border-slate-200 text-slate-500 font-medium text-sm";
            resDiv.innerHTML = "🔄 6대 심사 규격에 맞춰 Pandas 프레임워크 실시간 연산 중...";

            try {
                const res = await fetch('/api/audit-dataset', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                    resDiv.classList.add('hidden');
                    return;
                }

                // 종합 등급 배경색 테마 매핑
                if (data.grade === 'S' || data.grade === 'A') {
                    resDiv.className = "mt-8 p-6 border rounded-2xl bg-emerald-50/60 border-emerald-200 text-emerald-900 shadow-sm text-left";
                } else if (data.grade === 'B') {
                    resDiv.className = "mt-8 p-6 border rounded-2xl bg-amber-50/60 border-amber-200 text-amber-900 shadow-sm text-left";
                } else {
                    resDiv.className = "mt-8 p-6 border rounded-2xl bg-rose-50/60 border-rose-200 text-rose-900 shadow-sm text-left";
                }

                // ✨ [개편] 6대 심사 항목이 깔끔한 그리드로 표출되는 동적 레이아웃
                resDiv.innerHTML = `
                    <div class="text-center pb-4 border-b border-dashed border-slate-300/60">
                        <span class="text-xs uppercase tracking-widest font-black text-slate-400">종합 보안 인증 결과</span>
                        <div class="text-4xl font-black text-slate-900 mt-1">${data.grade} Grade</div>
                        <p class="text-[11px] text-slate-500 mt-1">파일명: ${data.filename} (${data.audit_time})</p>
                    </div>
                    
                    <div class="mt-4 grid grid-cols-2 gap-3">
                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-800">🛡️ 1. K-익명성 위험도</p>
                                <p class="text-[11px] text-slate-500">위험군: ${data.risk_ratio}%</p>
                            </div>
                            <span class="text-xs font-extrabold px-2.5 py-0.5 rounded-md bg-slate-100 text-slate-700">${data.risk_grade}</span>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-800">📉 2. 데이터 결측치율</p>
                                <p class="text-[11px] text-slate-500">공백률: ${data.null_ratio}%</p>
                            </div>
                            <span class="text-xs font-extrabold px-2.5 py-0.5 rounded-md bg-slate-100 text-slate-700">${data.null_grade}</span>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-800">🆔 3. 식별정보 노출도</p>
                                <p class="text-[11px] text-slate-500">피식별률: ${data.pii_ratio}%</p>
                            </div>
                            <span class="text-xs font-extrabold px-2.5 py-0.5 rounded-md bg-slate-100 text-slate-700">${data.pii_grade}</span>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-800">📊 4. 통계적 이상치율</p>
                                <p class="text-[11px] text-slate-500">이상치: ${data.outlier_ratio}%</p>
                            </div>
                            <span class="text-xs font-extrabold px-2.5 py-0.5 rounded-md bg-slate-100 text-slate-700">${data.outlier_grade}</span>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-800">🔗 5. 준식별 결합 위험</p>
                                <p class="text-[11px] text-slate-500">고유조합: ${data.combo_ratio}%</p>
                            </div>
                            <span class="text-xs font-extrabold px-2.5 py-0.5 rounded-md bg-slate-100 text-slate-700">${data.linkage_grade}</span>
                        </div>

                        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs flex justify-between items-center">
                            <div>
                                <p class="text-xs font-bold text-slate-800">🗂️ 6. 표본 규모 적정성</p>
                                <p class="text-[11px] text-slate-500">총 레코드: ${data.total_rows}개</p>
                            </div>
                            <span class="text-xs font-extrabold px-2.5 py-0.5 rounded-md bg-slate-100 text-slate-700">${data.row_grade}</span>
                        </div>
                    </div>
                `;
            } catch (error) {
                alert('서버 연동 실패! 백엔드가 정상 기동 중인지 터미널을 확인하세요.');
                resDiv.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
