<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>K-Anonymity Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-8">

    <div class="max-w-6xl w-full bg-white p-14 rounded-3xl shadow-md border border-slate-200 flex gap-16">

        <div class="w-1/2 flex flex-col justify-between">
            <div>
                <h1 class="text-3xl font-black text-slate-900 mb-3 tracking-tight">K-Anonymity Auditor</h1>
                <p class="text-base text-slate-500 mb-10 leading-relaxed">데이터 배포 전, 6가지 품질 기준 및 재식별 위험을 통계적으로 자동 진단하는 보안
                    게이트웨이입니다.</p>

                <div class="space-y-8">
                    <div class="p-5 bg-slate-50/80 rounded-2xl border border-slate-100">
                        <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">🛡️ 1순위: K-익명성 위험도
                        </h3>
                        <p class="text-sm text-slate-500 leading-relaxed">사전 체크리스트와 연동하여 개인 식별 위험(K=3 미만)을 감지합니다.</p>
                    </div>
                    <div class="p-5 bg-slate-50/80 rounded-2xl border border-slate-100">
                        <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">📉 2순위: 데이터 품질(완결성/편향성
                            등)</h3>
                        <p class="text-sm text-slate-500 leading-relaxed">결측치율(Null) 등 데이터셋의 품질 무결성을 다각도로 검증합니다.</p>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 mt-8">
                <p class="text-xs text-slate-400 font-medium italic">※ 데이터 심사 결과는 Firebase Firestore 데이터베이스에 안전하게 자동
                    기록됩니다.</p>
            </div>
        </div>

        <div class="w-1/2 flex flex-col justify-center border-l border-slate-100 pl-16">

            <div class="mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                <h3 class="text-sm font-bold text-slate-800 mb-4 tracking-wide">1. 사전 조건 체크</h3>
                <label class="flex items-center gap-3 mb-4 cursor-pointer">
                    <input type="checkbox" id="hasPersonalInfo"
                        class="w-5 h-5 text-indigo-600 rounded border-slate-300">
                    <span class="text-sm text-slate-700 font-medium">개인정보(이름, 연락처 등)가 포함되어 있나요?</span>
                </label>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-slate-700 font-medium w-28">데이터 성격:</span>
                    <select id="dataType"
                        class="flex-1 text-sm border border-slate-300 rounded-lg p-2.5 bg-white text-slate-600 outline-none">
                        <option value="population">인구/통계/개인 데이터</option>
                        <option value="environment">환경/자연/비생물 데이터</option>
                        <option value="etc">기타 범용 데이터</option>
                    </select>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-800 mb-3 tracking-wide">2. 심사할 CSV 파일 업로드</label>
                <input type="file" id="csvFile"
                    class="block w-full text-sm text-slate-500 file:mr-5 file:py-3 file:px-6 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer font-medium">
            </div>

            <button onclick="audit()"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl text-base font-bold hover:bg-slate-800 active:scale-[0.99] transition-all shadow-sm">
                보안 등급 심사 시작
            </button>

            <div id="result" class="hidden mt-10 p-8 border rounded-2xl text-center shadow-sm"></div>
        </div>
    </div>

    <script>
        async function audit() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert('심사할 CSV 파일을 선택해주세요.');

            const formData = new FormData();
            formData.append('file', file);
            // [추가된 기능] 프론트에서 체크한 값을 백엔드로 전송
            formData.append('has_personal_info', document.getElementById('hasPersonalInfo').checked);
            formData.append('data_type', document.getElementById('dataType').value);

            const resDiv = document.getElementById('result');
            resDiv.classList.remove('hidden');
            resDiv.className = "mt-10 p-8 border rounded-2xl text-center bg-slate-50 border-slate-200 text-slate-500 font-medium text-sm";
            resDiv.innerHTML = "🔄 파이썬 Pandas 엔진 및 데이터베이스 연결 중...";

            try {
                const res = await fetch('/api/audit-dataset', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                    resDiv.classList.add('hidden');
                    return;
                }

                if (data.grade === 'S' || data.grade === 'A') {
                    resDiv.className = "mt-10 p-8 border rounded-2xl text-center bg-emerald-50 border-emerald-200 text-emerald-800 shadow-sm";
                } else if (data.grade === 'B') {
                    resDiv.className = "mt-10 p-8 border rounded-2xl text-center bg-amber-50 border-amber-200 text-amber-800 shadow-sm";
                } else {
                    resDiv.className = "mt-10 p-8 border rounded-2xl text-center bg-rose-50 border-rose-200 text-rose-800 shadow-sm";
                }

                // [수정된 기능] DB 저장 여부와 개인정보 유무에 따른 안내 문구 추가
                const dbStatus = data.saved_to_db ? "✅ DB 기록 완료" : "⚠️ DB 기록 실패";
                resDiv.innerHTML = `
                    <div class="text-xs font-bold text-slate-400 mb-2">${dbStatus}</div>
                    <div class="text-5xl font-black mb-3 tracking-wider">등급: ${data.grade} Grade</div>
                    <p class="text-base font-semibold leading-relaxed">
                        개인 식별 위험군: [ ${data.risk_ratio}% ] <br>
                        데이터 결측치(Null): [ ${data.null_ratio}% ]
                    </p>
                `;
            } catch (error) {
                alert('서버 연결 실패! 주소창 및 백엔드 실행 상태를 확인해주세요.');
                resDiv.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
