<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>K-Anonymity Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-4xl w-full bg-white p-10 rounded-2xl shadow-sm border border-slate-200 flex gap-12">
        
        <div class="w-1/2">
            <h1 class="text-xl font-black text-slate-900 mb-2">K-Anonymity Auditor</h1>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">데이터 배포 전, 재식별 위험을 통계적으로 자동 진단하는 보안 게이트웨이입니다.</p>
            
            <div class="space-y-6">
                <div>
                    <h3 class="text-sm font-bold text-slate-800 mb-1">🛡️ 1순위: K-익명성 (K=3)</h3>
                    <p class="text-xs text-slate-500">동일한 특성을 가진 조합이 3명 미만인 레코드는 식별 위험군으로 분류하여 전체 통계화합니다.</p>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800 mb-1">📉 2순위: 데이터 결측치율</h3>
                    <p class="text-xs text-slate-500">전체 데이터셋의 무결성을 검증하며, 데이터 품질을 5% 결측치 기준으로 평가합니다.</p>
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <p class="text-[10px] text-slate-400 italic">※ 개인정보보호 정책: 개별 식별 정보는 절대 출력되지 않으며, 오직 통계적 위험 수치(%)만 제공합니다.</p>
                </div>
            </div>
        </div>

        <div class="w-1/2 flex flex-col justify-center">
            <div class="mb-8">
                <label class="block text-xs font-bold text-slate-700 mb-2">심사할 CSV 파일 업로드</label>
                <input type="file" id="csvFile" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
            </div>
            
            <button onclick="audit()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition-all">
                심사 시작
            </button>

            <div id="result" class="hidden mt-8 p-6 border rounded-2xl text-center">
                <div id="gradeBadge" class="text-4xl font-black mb-2"></div>
                <p id="riskSummary" class="text-sm font-medium text-slate-700"></p>
            </div>
        </div>
    </div>

    <script>
        async function audit() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert('파일을 선택해주세요.');

            const formData = new FormData();
            formData.append('file', file);
            
            const res = await fetch('/api/audit-dataset', { method: 'POST', body: formData });
            const data = await res.json();
            
            const resDiv = document.getElementById('result');
            const gradeBadge = document.getElementById('gradeBadge');
            const riskSummary = document.getElementById('riskSummary');

            resDiv.classList.remove('hidden');
            gradeBadge.innerText = `Grade ${data.grade}`;
            riskSummary.innerText = `전체 데이터의 ${data.risk_ratio}%가 식별 위험군입니다.`;
            
            resDiv.className = `mt-8 p-6 border rounded-2xl text-center ${data.grade === 'S' || data.grade === 'A' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`;
        }
    </script>
</body>
</html>
